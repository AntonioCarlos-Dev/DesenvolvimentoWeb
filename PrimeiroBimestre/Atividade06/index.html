<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Controle - Missões</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="todo-card">
        
        <h1>Missões do Dia</h1>
        
        <form id="formTarefa" class="input-group">
            <input type="text" id="inputTarefa" aria-label="Digite a nova tarefa" placeholder="Qual a próxima tarefa da missão?">
            <button type="submit" id="btnAdicionar">Adicionar</button>
        </form>

        <ul id="listaTarefas"></ul>
    </main>

    <script src="app.js"></script>
</body>
</html>
